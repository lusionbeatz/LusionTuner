name: Build macOS (VST3 + AU)

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS – Release (VST3 + AU)
    runs-on: macos-14

    env:
      JUCE_VERSION: "8.0.10"
      BUILD_DIR:    build_mac
      PLUGIN_NAME:  LusionTuner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-${{ env.JUCE_VERSION }}-v6

      - name: Download JUCE ${{ env.JUCE_VERSION }}
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/archive/refs/tags/${{ env.JUCE_VERSION }}.zip" -o juce.zip
          unzip -q juce.zip
          mv JUCE-${{ env.JUCE_VERSION }} JUCE

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Patch JUCE and JuceHeader
        run: |
          grep -v "juce_audio_processors_headless" JuceLibraryCode/JuceHeader.h > /tmp/JuceHeader_fixed.h
          mv /tmp/JuceHeader_fixed.h JuceLibraryCode/JuceHeader.h
          FILE="JUCE/modules/juce_audio_plugin_client/juce_audio_plugin_client_VST3.cpp"
          if [ -f "$FILE" ]; then
            sed -i '' 's/#error You may have a conflict with parameter automation/\/\/ #error You may have a conflict with parameter automation/' "$FILE"
            echo "VST3 patch done"
          else
            find JUCE -name "juce_audio_plugin_client_VST3.cpp" 2>/dev/null
          fi

      - name: Configure CMake
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -G "Xcode" \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_PATH="${{ github.workspace }}/JUCE" \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_BUILD_EXAMPLES=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build Release
        run: |
          cmake --build ${{ env.BUILD_DIR }} \
            --config Release \
            --target "${{ env.PLUGIN_NAME }}_VST3" "${{ env.PLUGIN_NAME }}_AU" \
            --parallel $(sysctl -n hw.logicalcpu)

      - name: Package artefacts
        run: |
          mkdir -p artifacts
          VST3=$(find ${{ env.BUILD_DIR }} -name "${{ env.PLUGIN_NAME }}.vst3" -type d | head -1)
          AU=$(find ${{ env.BUILD_DIR }} -name "${{ env.PLUGIN_NAME }}.component" -type d | head -1)
          echo "VST3: $VST3"
          echo "AU: $AU"
          [ -n "$VST3" ] || { echo "VST3 not found"; exit 1; }
          [ -n "$AU" ]   || { echo "AU not found"; exit 1; }
          zip -r "artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip" "$VST3"
          zip -r "artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip" "$AU"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macOS-VST3
          path: artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip
          retention-days: 90

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macOS-AU
          path: artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip
            artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip
