# ─────────────────────────────────────────────────────────────────────────────
# LusionTuner – macOS CI  (VST3 + AU)
# Triggered on every push / pull-request that touches any source file,
# and can also be run manually from the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────
name: Build macOS (VST3 + AU)

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'Source/**'
      - 'CMakeLists.txt'
      - 'LusionTuner.jucer'
      - 'JuceLibraryCode/**'
      - '.github/workflows/build-macos.yml'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # allows manual trigger from GitHub UI

# Cancel any in-progress run for the same branch so we don't waste minutes
concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS – Release (VST3 + AU)
    runs-on: macos-14           # Apple Silicon runner (Xcode 15+, macOS 14)

    env:
      JUCE_VERSION: "8.0.10"   # JUCE 8.0.10 – includes juce_audio_processors_headless
      BUILD_DIR:    build_mac
      PLUGIN_NAME:  LusionTuner

    steps:
      # ── 1. Checkout your repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Cache JUCE source so we don't re-download every run ──────────────
      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-${{ env.JUCE_VERSION }}-v2

      - name: Download JUCE ${{ env.JUCE_VERSION }}
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/juce-framework/JUCE/archive/refs/tags/${{ env.JUCE_VERSION }}.zip" \
            -o juce.zip
          unzip -q juce.zip
          # Archive unpacks as JUCE-<version>/ — rename to JUCE/
          mv JUCE-${{ env.JUCE_VERSION }} JUCE
          ls -la JUCE/CMakeLists.txt

      # ── 3. Select a stable Xcode version ───────────────────────────────────
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── 4. Configure with CMake ─────────────────────────────────────────────
      #   • JUCE_BUILD_EXTRAS / JUCE_BUILD_EXAMPLES off → faster configure
      #   • formats: VST3 and AU
      #   • universal binary (arm64 + x86_64) for maximum compatibility
      - name: Configure CMake
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -G "Xcode" \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_PATH="${{ github.workspace }}/JUCE" \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_BUILD_EXAMPLES=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      # ── 5. Build Release ────────────────────────────────────────────────────
      - name: Build Release
        run: |
          cmake --build ${{ env.BUILD_DIR }} \
            --config Release \
            --target "${{ env.PLUGIN_NAME }}_VST3" \
                     "${{ env.PLUGIN_NAME }}_AU" \
            --parallel $(sysctl -n hw.logicalcpu)

      # ── 6. Locate and verify the built artefacts ────────────────────────────
      - name: Locate build artefacts
        id: locate
        run: |
          echo "=== Searching for VST3 ==="
          VST3=$(find ${{ env.BUILD_DIR }} -name "${{ env.PLUGIN_NAME }}.vst3" \
                   -type d 2>/dev/null | head -1)
          echo "VST3 found: $VST3"

          echo "=== Searching for AU ==="
          AU=$(find ${{ env.BUILD_DIR }} -name "${{ env.PLUGIN_NAME }}.component" \
                 -type d 2>/dev/null | head -1)
          echo "AU found: $AU"

          # Fail fast if either artefact is missing
          [ -n "$VST3" ] || { echo "ERROR: VST3 not found"; exit 1; }
          [ -n "$AU"   ] || { echo "ERROR: AU not found";   exit 1; }

          # Expose paths to later steps
          echo "vst3_path=$VST3" >> "$GITHUB_OUTPUT"
          echo "au_path=$AU"     >> "$GITHUB_OUTPUT"

      # ── 7. Zip the bundles (they are directories on macOS) ──────────────────
      - name: Package artefacts
        run: |
          mkdir -p artifacts
          cd "${{ steps.locate.outputs.vst3_path }}/.."
          zip -r "${{ github.workspace }}/artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip" \
               "${{ env.PLUGIN_NAME }}.vst3"

          cd "${{ steps.locate.outputs.au_path }}/.."
          zip -r "${{ github.workspace }}/artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip" \
               "${{ env.PLUGIN_NAME }}.component"

          echo "=== Artifact contents ==="
          ls -lh "${{ github.workspace }}/artifacts/"

      # ── 8. Upload as GitHub Actions artefacts (downloadable 90 days) ────────
      - name: Upload VST3 artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macOS-VST3
          path: artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip
          retention-days: 90

      - name: Upload AU artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macOS-AU
          path: artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip
          retention-days: 90

      # ── 9. (Optional) attach to a GitHub Release if this is a version tag ───
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.PLUGIN_NAME }}_macOS_VST3.zip
            artifacts/${{ env.PLUGIN_NAME }}_macOS_AU.zip
